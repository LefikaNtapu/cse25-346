<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listings - Setlhoa Apartments</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container my-5">
    <h2 class="text-center mb-4">Available Apartments</h2>

    <div class="row">

        <!-- Apartment 1 -->
        <div class="col-md-4">
            <div class="card">
                <img src="https://via.placeholder.com/300" class="card-img-top">
                <div class="card-body">
                    <h5>1 Bedroom Apartment</h5>
                    <p>P2500/month</p>
                    <button class="btn btn-success">Book Now</button>
                </div>
            </div>
        </div>

        <!-- Apartment 2 -->
        <div class="col-md-4">
            <div class="card">
                <img src="https://via.placeholder.com/300" class="card-img-top">
                <div class="card-body">
                    <h5>2 Bedroom Apartment</h5>
                    <p>P4000/month</p>
                    <button class="btn btn-success">Book Now</button>
                </div>
            </div>
        </div>

        <!-- Apartment 3 -->
        <div class="col-md-4">
            <div class="card">
                <img src="https://via.placeholder.com/300" class="card-img-top">
                <div class="card-body">
                    <h5>Luxury Apartment</h5>
                    <p>P7000/month</p>
                    <button class="btn btn-success">Book Now</button>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
